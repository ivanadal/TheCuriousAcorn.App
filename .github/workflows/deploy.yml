name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: thecuriousacorn.app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: thecuriousacorn.app

      - name: Generate production environment file from secrets
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.prod.ts << 'EOF'
          export const environment = {
            production: true,
            apiUrl: '${{ secrets.API_URL }}',
            apiBaseUrl: '${{ secrets.API_BASE_URL }}'
          };
          EOF
        working-directory: thecuriousacorn.app

      - name: Build
        run: npm run build -- --base-href /TheCuriousAcorn.App/
        working-directory: thecuriousacorn.app

      - name: Copy index.html to 404.html for SPA routing
        run: cp thecuriousacorn.app/dist/thecuriousacorn.app/browser/index.html thecuriousacorn.app/dist/thecuriousacorn.app/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: thecuriousacorn.app/dist/thecuriousacorn.app/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
